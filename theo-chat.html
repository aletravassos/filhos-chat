<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat do Theo 🎉</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #3B82F6;
    --amarelo: #FBBF24;
    --verde: #34D399;
    --vermelho: #F87171;
    --laranja: #FB923C;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Nunito', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #3B82F6 0%, #34D399 50%, #FBBF24 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .app {
    width: 100%;
    max-width: 480px;
    height: 92vh;
    background: #FFFBEB;
    border-radius: 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 6px #FFF;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 6px solid #FBBF24;
  }
  header {
    background: linear-gradient(120deg, var(--azul), var(--verde));
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 6px solid var(--amarelo);
  }
  .avatar {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: #FFF;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    box-shadow: 0 0 0 4px var(--amarelo), 0 4px 8px rgba(0,0,0,0.25);
    flex-shrink: 0;
    animation: wiggle 2.5s ease-in-out infinite;
  }
  @keyframes wiggle { 0%, 100% { transform: rotate(-4deg); } 50% { transform: rotate(4deg); } }
  .header-info { color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.25); }
  .header-info h1 { margin: 0; font-size: 26px; font-weight: 900; }
  .header-info p { margin: 2px 0 0; font-size: 15px; font-weight: 700; }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background:
      radial-gradient(circle at 10% 20%, rgba(251,191,36,0.15) 0, transparent 25%),
      radial-gradient(circle at 90% 60%, rgba(52,211,153,0.15) 0, transparent 25%),
      #FFFBEB;
  }
  .msg { max-width: 80%; padding: 13px 17px; border-radius: 22px; font-size: 18px; line-height: 1.65; word-wrap: break-word; animation: pop 0.3s ease; font-weight: 700; }
  @keyframes pop { from { opacity: 0; transform: translateY(10px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .msg.user {
    align-self: flex-end;
    background: var(--azul);
    color: #fff;
    border-bottom-right-radius: 6px;
    box-shadow: 0 3px 0 #1d4ed8;
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--verde);
    color: #064e3b;
    border-bottom-left-radius: 6px;
    box-shadow: 0 3px 0 #059669;
  }
  .msg.system {
    align-self: center;
    background: var(--amarelo);
    color: #78350f;
    font-size: 15px;
    text-align: center;
    border-radius: 14px;
    padding: 10px 16px;
    box-shadow: 0 3px 0 #d97706;
  }
  .typing { align-self: flex-start; display: flex; gap: 5px; padding: 14px 18px; background: var(--verde); border-radius: 22px; box-shadow: 0 3px 0 #059669; }
  .typing span { width: 9px; height: 9px; border-radius: 50%; background: #064e3b; animation: bounce 1.1s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-7px); } }
  form {
    display: flex;
    gap: 10px;
    padding: 16px;
    background: #FFFBEB;
    border-top: 4px dashed var(--amarelo);
  }
  #input {
    flex: 1;
    border: 3px solid var(--azul);
    border-radius: 24px;
    padding: 14px 18px;
    background: #fff;
    color: #1f2937;
    font-size: 18px;
    outline: none;
    font-weight: 700;
  }
  #input:focus { border-color: var(--verde); }
  #send {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: none;
    background: var(--laranja);
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: 0 4px 0 #c2410c;
    transition: transform 0.1s;
  }
  #send:active { transform: translateY(3px); box-shadow: 0 1px 0 #c2410c; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }

  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-thumb { background: var(--amarelo); border-radius: 4px; }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="avatar">🦖</div>
    <div class="header-info">
      <h1>Theo Rex</h1>
      <p>🟢 pronto pra brincar!</p>
    </div>
  </header>

  <div id="messages">
    <div class="msg system">🎈 Oi! Eu sou o Theo Rex! Escreve algo pra brincarmos! 🦖</div>
  </div>

  <form id="form">
    <input type="text" id="input" placeholder="Escreve aqui pro Theo... 🦖" autocomplete="off">
    <button type="submit" id="send">🚀</button>
  </form>
</div>

<script>
const SYSTEM_PROMPT = `Você é o Theo Rex, um dinossaurinho amigo virtual super divertido e animado, que conversa com uma criança de 9 anos.
Seu jeito de falar:
- Seja muito alegre, curioso e brincalhão, como um melhor amigo de aventuras.
- Use frases curtas, simples e fáceis de entender para uma criança de 9 anos.
- Use bastante emojis para deixar tudo mais divertido (mas sem exagerar a ponto de poluir a mensagem).
- Adore falar sobre dinossauros, animais, espaço, desenhos, brincadeiras, escola e curiosidades legais.
- Seja sempre gentil, encorajador e elogie esforços da criança (ex: tarefas de escola, desenhos, ideias).
- Nunca trate de temas assustadores, violentos, sexuais ou inadequados para a idade. Se a criança perguntar algo assim, desconverse com gentileza e sugira conversar com um adulto de confiança.
- Se a criança parecer triste, com medo ou contar algo preocupante, seja acolhedor e sugira com carinho que conte para um adulto de confiança (pai, mãe ou professor).
- Responda sempre em português brasileiro, em mensagens curtas, divertidas e fáceis de ler.`;

// Troque pela URL do seu worker depois do "wrangler deploy"
// (ex.: 'https://claude-proxy-worker.SEU-USUARIO.workers.dev')
const WORKER_URL = 'https://claude-proxy-worker.aletravassos.workers.dev';

const messagesEl = document.getElementById('messages');
const form = document.getElementById('form');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');

let conversationHistory = [];

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function sendMessage(text) {
  addMessage(text, 'user');
  conversationHistory.push({ role: 'user', content: text });
  input.value = '';
  sendBtn.disabled = true;
  showTyping();

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    hideTyping();

    if (!response.ok) {
      const errData = await response.json().catch(() => ({}));
      addMessage('❌ Ops! Erro: ' + (errData.error?.message || response.statusText), 'system');
      return;
    }

    const data = await response.json();
    const reply = data.content?.[0]?.text || '...';
    addMessage(reply, 'bot');
    conversationHistory.push({ role: 'assistant', content: reply });
  } catch (err) {
    hideTyping();
    addMessage('❌ Não consegui me conectar: ' + err.message, 'system');
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  sendMessage(text);
});
</script>

</body>
</html>
