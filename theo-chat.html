<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat do Theo 🎉</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #3B82F6;
    --amarelo: #FBBF24;
    --verde: #34D399;
    --vermelho: #F87171;
    --laranja: #FB923C;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Nunito', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #3B82F6 0%, #34D399 50%, #FBBF24 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .app {
    width: 100%; max-width: 480px; height: 92vh;
    background: #FFFBEB; border-radius: 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 6px #FFF;
    display: flex; flex-direction: column; overflow: hidden;
    border: 6px solid #FBBF24; position: relative;
  }
  header {
    background: linear-gradient(120deg, var(--azul), var(--verde));
    padding: 13px 16px; display: flex; align-items: center; gap: 10px;
    border-bottom: 6px solid var(--amarelo); flex-shrink: 0;
    transition: background 0.4s ease;
  }
  header.kumon-mode { background: linear-gradient(120deg, #14532d, #166534); }
  .avatar {
    width: 54px; height: 54px; border-radius: 50%; background: #FFF;
    display: flex; align-items: center; justify-content: center; font-size: 32px;
    box-shadow: 0 0 0 4px var(--amarelo), 0 4px 8px rgba(0,0,0,0.25);
    flex-shrink: 0; animation: wiggle 2.5s ease-in-out infinite;
  }
  @keyframes wiggle { 0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);} }
  .header-info { color:#fff; text-shadow:1px 1px 2px rgba(0,0,0,0.25); flex:1; min-width:0; }
  .header-info h1 { margin:0; font-size:24px; font-weight:900; }
  .header-info p  { margin:1px 0 0; font-size:14px; font-weight:700; }
  #study-btn {
    background: rgba(255,255,255,0.25); border: 2.5px solid rgba(255,255,255,0.6);
    color: #fff; border-radius: 22px; padding: 8px 13px; font-size: 13px; font-weight: 800;
    cursor: pointer; white-space: nowrap; font-family: inherit;
    transition: background .2s, transform .1s; text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    flex-shrink: 0;
  }
  #study-btn:hover  { background: rgba(255,255,255,0.42); }
  #study-btn.active { background: rgba(255,255,255,0.92); color: #14532d; text-shadow: none; }

  #kumon-banner {
    display: none; padding: 8px 14px; background: #14532d;
    color: #bbf7d0; font-size: 13px; font-weight: 800; text-align: center;
    border-bottom: 3px dashed #4ade80; flex-shrink: 0;
    transition: background 0.5s ease, color 0.5s ease;
  }
  #kumon-banner.visible { display: block; }
  #kumon-banner.warning {
    background: linear-gradient(90deg, #78350f, #92400e);
    color: #fef9c3; border-bottom-color: #fbbf24;
    animation: warn-pulse 1.5s ease-in-out infinite;
  }
  @keyframes warn-pulse { 0%,100%{opacity:1;} 50%{opacity:0.82;} }

  #kumon-bar {
    display: none; padding: 8px 14px 6px; background: #FEF3C7;
    border-bottom: 3px dashed var(--amarelo); align-items: center; gap: 10px; flex-shrink: 0;
  }
  #kumon-bar.visible { display: flex; }
  #kumon-bar-label { font-size: 13px; color: #92400e; white-space: nowrap; font-weight: 800; }
  #kumon-track { flex:1; height:10px; background:rgba(251,191,36,0.3); border-radius:8px; overflow:hidden; }
  #kumon-fill  { height:100%; background:linear-gradient(90deg,var(--azul),var(--verde)); border-radius:8px; transition:width .45s ease; width:0%; }
  #kumon-score { font-size:13px; color:#92400e; white-space:nowrap; font-weight:800; }

  #messages {
    flex:1; overflow-y:auto; padding:18px 14px;
    display:flex; flex-direction:column; gap:14px;
    background:
      radial-gradient(circle at 10% 20%, rgba(251,191,36,0.15) 0, transparent 25%),
      radial-gradient(circle at 90% 60%, rgba(52,211,153,0.15) 0, transparent 25%),
      #FFFBEB;
  }
  .msg { max-width:80%; padding:13px 17px; border-radius:22px; font-size:18px; line-height:1.65; word-wrap:break-word; animation:pop .3s ease; font-weight:700; }
  @keyframes pop { from{opacity:0;transform:translateY(10px) scale(0.9);}to{opacity:1;transform:translateY(0) scale(1);} }
  .msg.user   { align-self:flex-end; background:var(--azul); color:#fff; border-bottom-right-radius:6px; box-shadow:0 3px 0 #1d4ed8; }
  .msg.bot    { align-self:flex-start; background:var(--verde); color:#064e3b; border-bottom-left-radius:6px; box-shadow:0 3px 0 #059669; }
  .msg.system { align-self:center; background:var(--amarelo); color:#78350f; font-size:15px; text-align:center; border-radius:14px; padding:10px 16px; box-shadow:0 3px 0 #d97706; }
  .typing { align-self:flex-start; display:flex; gap:5px; padding:14px 18px; background:var(--verde); border-radius:22px; box-shadow:0 3px 0 #059669; }
  .typing span { width:9px; height:9px; border-radius:50%; background:#064e3b; animation:bounce 1.1s infinite; }
  .typing span:nth-child(2){animation-delay:.15s;}.typing span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-7px);}}
  form { display:flex; gap:10px; padding:14px 16px; background:#FFFBEB; border-top:4px dashed var(--amarelo); flex-shrink:0; }
  #input { flex:1; border:3px solid var(--azul); border-radius:24px; padding:14px 18px; background:#fff; color:#1f2937; font-size:18px; outline:none; font-weight:700; font-family:inherit; }
  #input:focus   { border-color: var(--verde); }
  #input:disabled{ opacity: 0.5; }
  #send { width:54px; height:54px; border-radius:50%; border:none; background:var(--laranja); color:#fff; font-size:24px; cursor:pointer; flex-shrink:0; box-shadow:0 4px 0 #c2410c; transition:transform .1s; }
  #send:active  { transform:translateY(3px); box-shadow:0 1px 0 #c2410c; }
  #send:disabled{ opacity:.5; cursor:not-allowed; }
  #messages::-webkit-scrollbar{width:6px;}
  #messages::-webkit-scrollbar-thumb{background:var(--amarelo);border-radius:4px;}

  #subject-overlay, #summary-overlay {
    display:none; position:absolute; inset:0; z-index:30;
    flex-direction:column; align-items:center; justify-content:center;
    padding:24px 20px; text-align:center;
  }
  #subject-overlay.visible, #summary-overlay.visible { display: flex; }
  #subject-overlay { background:linear-gradient(160deg,#EFF6FF 0%,#ECFDF5 100%); }
  #subject-overlay h2 { color:#1d4ed8; margin:0 0 4px; font-size:24px; font-weight:900; }
  .sub-desc { color:#065f46; font-size:15px; margin:0 0 18px; font-weight:700; }
  .subject-btns { display:flex; flex-direction:column; gap:12px; width:100%; max-width:290px; }
  .subject-btn {
    display:flex; align-items:center; gap:14px; padding:16px 20px;
    border-radius:20px; border:3px solid #FBBF24; background:#FFFBEB;
    color:#1f2937; font-size:18px; font-weight:800; cursor:pointer;
    text-align:left; font-family:inherit; box-shadow:0 4px 0 #d97706;
    transition:transform .15s, box-shadow .15s;
  }
  .subject-btn:hover  { transform:translateY(-2px); box-shadow:0 6px 0 #d97706; background:#FEF3C7; }
  .subject-btn:active { transform:translateY(2px); box-shadow:0 2px 0 #d97706; }
  .s-icon { font-size:26px; }
  .s-info { flex:1; }
  .s-name   { display:block; }
  .s-nivel  { display:block; font-size:12px; color:#6b7280; margin-top:2px; font-weight:700; }
  .s-sessoes{ display:block; font-size:11px; color:#9ca3af; margin-top:1px; font-weight:700; }
  .overlay-cancel { margin-top:16px; background:none; border:none; color:#9ca3af; cursor:pointer; font-size:15px; font-family:inherit; font-weight:700; transition:color .15s; }
  .overlay-cancel:hover { color:#374151; }

  #summary-overlay { background:linear-gradient(160deg,#FFFBEB 0%,#ECFDF5 100%); gap:4px; }
  #summary-overlay h2 { color:#1d4ed8; margin:0 0 2px; font-size:26px; font-weight:900; }
  .summary-stars { font-size:44px; letter-spacing:4px; margin:6px 0; }
  .summary-score { color:#065f46; font-size:19px; font-weight:800; margin:2px 0; }
  .summary-msg   { color:#374151; font-size:15px; font-weight:700; margin:4px 0 6px; }
  .summary-level-msg { color:#d97706; font-size:15px; font-weight:900; margin-bottom:14px; }
  .summary-btn { padding:15px 36px; border-radius:28px; border:none; background:var(--laranja); color:#fff; font-size:18px; font-weight:900; cursor:pointer; font-family:inherit; box-shadow:0 4px 0 #c2410c; transition:transform .1s; }
  .summary-btn:active { transform:translateY(2px); box-shadow:0 2px 0 #c2410c; }
</style>
</head>
<body>
<div class="app">
  <header id="header">
    <div class="avatar">🦖</div>
    <div class="header-info">
      <h1>Theo Rex</h1>
      <p>🟢 pronto pra brincar!</p>
    </div>
    <button id="study-btn">📚 Kumon</button>
  </header>

  <div id="kumon-banner">📚 Modo Kumon Ativo — <span id="banner-text"></span></div>

  <div id="kumon-bar">
    <span id="kumon-bar-label">Desafio 0/5</span>
    <div id="kumon-track"><div id="kumon-fill"></div></div>
    <span id="kumon-score">✅ 0 &nbsp;❌ 0</span>
  </div>

  <div id="messages">
    <div class="msg system">🎈 Oi! Eu sou o Theo Rex! Escreve algo pra brincarmos! 🦖</div>
  </div>

  <div id="subject-overlay">
    <h2>📚 Estudar hoje!</h2>
    <p class="sub-desc">Qual aventura do saber vamos escolher? 🦖</p>
    <div class="subject-btns" id="subject-btns"></div>
    <button class="overlay-cancel" onclick="closeSubjectOverlay()">cancelar</button>
  </div>

  <div id="summary-overlay">
    <h2 id="sum-title">Aventura concluída!</h2>
    <div class="summary-stars" id="sum-stars"></div>
    <div class="summary-score" id="sum-score"></div>
    <div class="summary-msg"   id="sum-msg"></div>
    <div class="summary-level-msg" id="sum-level"></div>
    <button class="summary-btn" onclick="closeSummary()">Continuar! 🚀</button>
  </div>

  <form id="form">
    <input type="text" id="input" placeholder="Escreve aqui pro Theo... 🦖" autocomplete="off">
    <button type="submit" id="send">🚀</button>
  </form>
</div>

<script>
// ── Config ────────────────────────────────────────────────────
const WORKER_URL      = 'https://claude-proxy-worker.aletravassos.workers.dev';
const PROFILE_USER    = 'theo';
const TOTAL_EXERCISES = 5;
const SESSIONS_TO_ADV = 3;
const KUMON_DURATION  = 15 * 60; // 15 minutos em segundos

const KUMON_SUBJECTS = [
  { id: 'tabuada', nome: 'Tabuada', icon: '🔢' },
];

// ── Detecção de tópicos do chat livre ────────────────────────
const TOPIC_MAP = {
  'matemática':   ['conta', 'número', 'cálculo', 'soma', 'subtrai', 'multiplic', 'divisão', 'divide', 'tabuada', 'geometria', 'matemática', 'raiz', 'potência'],
  'português':    ['redação', 'texto', 'gramática', 'verbo', 'substantivo', 'crase', 'pontuação', 'escrever', 'escrita', 'leitura', 'livro', 'poesia', 'português'],
  'inglês':       ['english', 'word', 'vocabulary', 'tradução', 'traduz', 'inglês', 'significa', 'speak', 'write'],
  'ciências':     ['animal', 'planta', 'célula', 'corpo humano', 'planeta', 'universo', 'experimento', 'natureza', 'biologia', 'química', 'física', 'ciência', 'fotossíntese'],
  'história':     ['guerra', 'revolução', 'história', 'século', 'imperador', 'rei', 'presidente', 'civilização', 'egito', 'grécia', 'roma'],
  'geografia':    ['país', 'continente', 'capital', 'mapa', 'clima', 'relevo', 'floresta', 'amazônia', 'bioma', 'rio', 'oceano', 'geografia'],
  'dinossauros':  ['dinossauro', 't-rex', 'tiranossauro', 'triceratops', 'velociraptor', 'jurássico', 'pterodátilo', 'fóssil', 'extinção'],
  'minecraft':    ['minecraft', 'crafting', 'creeper', 'enderman', 'nether', 'redstone', 'bloco', 'minerar'],
  'mario':        ['mario', 'luigi', 'bowser', 'peach', 'yoshi', 'cogumelo', 'nintendo', 'kart'],
  'pokémon':      ['pokémon', 'pokemon', 'pikachu', 'charizard', 'bulbasaur', 'evoluir', 'pokébola', 'treinar pokémon'],
  'super-heróis': ['super-herói', 'herói', 'batman', 'superman', 'homem-aranha', 'spider-man', 'thor', 'hulk', 'flash'],
};

function detectTopic(text) {
  const lower = text.toLowerCase();
  for (const [topic, keywords] of Object.entries(TOPIC_MAP)) {
    if (keywords.some(k => lower.includes(k))) return topic;
  }
  return null;
}

// ── Detecção de interesses para perfil ───────────────────────
const INTEREST_MAP = {
  jogos: [
    'minecraft','mario','pokémon','pokemon','roblox','fortnite','sonic','zelda',
    'kirby','luigi','yoshi','pikachu','jogo','videogame','switch','playstation',
    'xbox','console','fase','personagem','chefe','boss',
  ],
  personagens: [
    'pikachu','charizard','luigi','mario','link','sonic','batman','homem-aranha',
    'spider-man','hulk','thor','flash','capitão américa','ironman','homem de ferro',
    'super-herói','supman','superman',
  ],
  animais: [
    'cachorro','gato','dinossauro','t-rex','dragão','tubarão','leão','elefante',
    'peixe','pássaro','cobra','gorila','tigre','lobo','urso','macaco',
  ],
  dinossauros: [
    'dinossauro','t-rex','pterossauro','velociraptor','triceratops','stegossauro',
    'brontossauro','espinossauro','anquilossauro','pterodátilo',
  ],
  herois: [
    'batman','superman','spider-man','homem-aranha','hulk','flash','thor',
    'capitão','vingadores','avengers','dc','marvel','super-herói',
  ],
};

function detectInterests(text) {
  const lower = text.toLowerCase();
  const patches = {};
  for (const [cat, keywords] of Object.entries(INTEREST_MAP)) {
    const found = keywords.filter(k => lower.includes(k));
    if (found.length) patches[cat] = found;
  }
  return patches;
}

// ── Perfil ────────────────────────────────────────────────────
let userProfile = null;

async function loadProfile() {
  try {
    const r = await fetch(`${WORKER_URL}/profile/${PROFILE_USER}`);
    if (r.ok) userProfile = await r.json();
  } catch { /* sem perfil ainda */ }
}

async function saveInterests(patches) {
  if (!Object.keys(patches).length) return;
  try {
    await fetch(`${WORKER_URL}/profile/${PROFILE_USER}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ patches }),
    });
    if (userProfile) {
      for (const [cat, items] of Object.entries(patches)) {
        if (!userProfile[cat]) userProfile[cat] = [];
        const set = new Set(userProfile[cat].map(s => s.toLowerCase()));
        for (const i of items) if (!set.has(i.toLowerCase())) userProfile[cat].push(i);
      }
    }
  } catch { /* falha silenciosa */ }
}

function profileContext() {
  if (!userProfile) return '';
  const lines = [];
  if (userProfile.jogos?.length)        lines.push(`Jogos favoritos: ${userProfile.jogos.join(', ')}`);
  if (userProfile.personagens?.length)  lines.push(`Personagens que ele adora: ${userProfile.personagens.join(', ')}`);
  if (userProfile.herois?.length)       lines.push(`Super-heróis favoritos: ${userProfile.herois.join(', ')}`);
  if (userProfile.animais?.length)      lines.push(`Animais que ele gosta: ${userProfile.animais.join(', ')}`);
  if (userProfile.dinossauros?.length)  lines.push(`Dinossauros favoritos: ${userProfile.dinossauros.join(', ')}`);
  if (!lines.length) return '';
  return `\n\nCONTEXTO PESSOAL DO THEO (use esses interesses como pontes pedagógicas e contexto das histórias):\n${lines.join('\n')}`;
}

// ── Prompts ───────────────────────────────────────────────────
function chatSystemPrompt() {
  return `Você é o Theo Rex, um dinossaurinho amigo virtual super divertido e animado, que conversa com uma criança de 9 anos.
Seu jeito de falar:
- Seja muito alegre, curioso e brincalhão, como um melhor amigo de aventuras.
- Use frases curtas, simples e fáceis de entender para uma criança de 9 anos.
- Use bastante emojis para deixar tudo mais divertido (mas sem exagerar).
- Adore falar sobre dinossauros, animais, espaço, desenhos, brincadeiras, escola e curiosidades legais.
- Seja sempre gentil, encorajador e elogie esforços da criança.
- Nunca trate de temas assustadores, violentos, sexuais ou inadequados para a idade.
- Se a criança parecer triste, com medo ou contar algo preocupante, seja acolhedor e sugira conversar com um adulto de confiança.
- Responda sempre em português brasileiro, em mensagens curtas, divertidas e fáceis de ler.${profileContext()}`;
}

function buildKumonPrompt(subjectNome, nivel, tabuadaAtual) {
  const tab = tabuadaAtual || 1;
  const escopos = [
    '',
    `apenas ${tab}×1 e ${tab}×2`,
    `${tab}×1 até ${tab}×3`,
    `${tab}×1 até ${tab}×4`,
    `${tab}×1 até ${tab}×5`,
    `${tab}×1 até ${tab}×6`,
    `${tab}×1 até ${tab}×7`,
    `${tab}×1 até ${tab}×8`,
    `${tab}×1 até ${tab}×9`,
    `${tab}×1 até ${tab}×10 em sequência`,
    `tabuada do ${tab} completa, perguntas embaralhadas aleatoriamente`,
  ];
  return `Você é o Theo Rex, um dinossaurinho aventureiro! Agora estamos na AVENTURA DA TABUADA! 🦖🔢

TABUADA ATUAL: do ${tab}
NÍVEL DE DOMÍNIO: ${nivel}/10
ESCOPO DESTA SESSÃO: ${escopos[nivel]}
(USE APENAS multiplicações da tabuada do ${tab} dentro deste escopo — não saia dele!)

REGRAS DA AVENTURA:
1. Comece imediatamente com o Desafio 1/${TOTAL_EXERCISES}. Escreva "🦖 Desafio [N]/${TOTAL_EXERCISES}:" antes de cada questão.
2. Use a pedagogia Waldorf: envolva CADA desafio em uma mini-história ou aventura imaginativa. A multiplicação deve surgir naturalmente da narrativa. Exemplos de contextos que o Theo ama:
   - Minecraft: "Você está construindo uma muralha com ${tab} fileiras de blocos de pedra..."
   - Mario: "${tab} canos mágicos, cada um com X moedas escondidas lá dentro..."
   - Pokémon: "Você encontrou ${tab} grupos de X Pokémon na Rota 1..."
   Varie os contextos ao longo dos ${TOTAL_EXERCISES} desafios!
3. Use linguagem super animada, emojis e entusiasmo, adequada para 9 anos.
4. Quando a criança responder, avalie com muito entusiasmo! Se errou, explique gentilmente com a continuação da história. Celebre sempre o esforço.
5. Ao final da avaliação, em linha separada, escreva exatamente: [OK] (se correto) ou [ERRO] (se incorreto). Depois, apresente o próximo desafio imediatamente se ainda houver.
6. No desafio ${TOTAL_EXERCISES}/${TOTAL_EXERCISES}, após [OK] ou [ERRO], comemore muito a aventura toda! Não apresente novo desafio.
7. Se a criança fizer pergunta fora da tabuada: responda brevemente (1-2 frases) e redirecione conectando ao contexto da aventura.
8. Responda sempre em português brasileiro.${profileContext()}`;
}

// ── Estado ────────────────────────────────────────────────────
const messagesEl  = document.getElementById('messages');
const form        = document.getElementById('form');
const input       = document.getElementById('input');
const sendBtn     = document.getElementById('send');
const studyBtn    = document.getElementById('study-btn');
const headerEl    = document.getElementById('header');
const kumonBar    = document.getElementById('kumon-bar');
const kumonBanner = document.getElementById('kumon-banner');

let conversationHistory = [];
let kumon = null;

// ── Timer ─────────────────────────────────────────────────────
function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function updateBannerDisplay() {
  if (!kumon) return;
  document.getElementById('banner-text').textContent =
    `Tabuada do ${kumon.tabuadaAtual} • Nível ${kumon.nivel} • ⏱️ ${formatTime(kumon.timeLeft)}`;
}

function startTimer() {
  kumon.timeLeft = KUMON_DURATION;
  updateBannerDisplay();
  kumon.timerInterval = setInterval(() => {
    if (!kumon) return;
    kumon.timeLeft--;
    updateBannerDisplay();
    if (kumon.timeLeft === 120) {
      kumonBanner.classList.add('warning');
      addMessage('⚠️ Faltam só 2 minutos! Vamos terminar essa aventura, Theo! 🦖', 'system');
    }
    if (kumon.timeLeft <= 0) {
      clearInterval(kumon.timerInterval);
      addMessage('⏰ Tempo esgotado! Fim da aventura! Você arrasou, Theo! 🦖⭐', 'system');
      setTimeout(() => showSummary(), 1500);
    }
  }, 1000);
}

// ── localStorage ──────────────────────────────────────────────
function loadProgress() {
  try { return JSON.parse(localStorage.getItem('kumon_theo') || '{}'); } catch { return {}; }
}
function saveProgress(p) { localStorage.setItem('kumon_theo', JSON.stringify(p)); }
function getNivel(id)     { return loadProgress()[id]?.nivel       || 1; }
function getTabuada(id)   { return loadProgress()[id]?.tabuadaAtual || 1; }
function getSessoes90(id) { return loadProgress()[id]?.sessoes90    || 0; }

function registrarSessao(id, nivel, acertou90) {
  const p = loadProgress();
  if (!p[id]) p[id] = { nivel: 1, tabuadaAtual: 1, sessoes90: 0 };
  if (!p[id].tabuadaAtual) p[id].tabuadaAtual = 1;
  if (acertou90) {
    p[id].sessoes90 = (p[id].sessoes90 || 0) + 1;
    if (p[id].sessoes90 >= SESSIONS_TO_ADV) {
      if (p[id].nivel < 10) {
        p[id].nivel++;
        p[id].sessoes90 = 0;
        saveProgress(p);
        return { novoNivel: p[id].nivel, avancou: 'nivel', sessoes90: 0, tabuadaAtual: p[id].tabuadaAtual };
      } else if (p[id].tabuadaAtual < 10) {
        p[id].tabuadaAtual++;
        p[id].nivel = 1;
        p[id].sessoes90 = 0;
        saveProgress(p);
        return { novoNivel: 1, avancou: 'tabuada', sessoes90: 0, tabuadaAtual: p[id].tabuadaAtual };
      }
    }
  }
  saveProgress(p);
  return { novoNivel: p[id].nivel, avancou: false, sessoes90: p[id].sessoes90, tabuadaAtual: p[id].tabuadaAtual };
}

// ── Kumon UI ──────────────────────────────────────────────────
function openSubjectOverlay() {
  const container = document.getElementById('subject-btns');
  container.innerHTML = '';
  KUMON_SUBJECTS.forEach(s => {
    const nivel   = getNivel(s.id);
    const tabuada = getTabuada(s.id);
    const sessoes = getSessoes90(s.id);
    const meta = nivel < 10 ? `para nível ${nivel + 1}` : tabuada < 10 ? `para tabuada do ${tabuada + 1}` : 'nível máximo!';
    const btn = document.createElement('button');
    btn.className = 'subject-btn';
    btn.innerHTML = `
      <span class="s-icon">${s.icon}</span>
      <span class="s-info">
        <span class="s-name">${s.nome} do ${tabuada}</span>
        <span class="s-nivel">Nível ${nivel}/10</span>
        <span class="s-sessoes">${sessoes}/${SESSIONS_TO_ADV} aventuras 90%+ ${meta}</span>
      </span>`;
    btn.onclick = () => startKumon(s.id, s.nome, s.icon, nivel, tabuada);
    container.appendChild(btn);
  });
  document.getElementById('subject-overlay').classList.add('visible');
}
function closeSubjectOverlay() {
  document.getElementById('subject-overlay').classList.remove('visible');
}

async function startKumon(subjectId, subjectNome, subjectIcon, nivel, tabuadaAtual) {
  closeSubjectOverlay();
  const tab = tabuadaAtual || 1;
  kumon = { subjectId, subjectNome, subjectIcon, nivel, tabuadaAtual: tab, count: 0, acertos: 0, erros: 0, timeLeft: KUMON_DURATION, timerInterval: null, startTime: Date.now() };

  headerEl.classList.add('kumon-mode');
  studyBtn.classList.add('active');
  studyBtn.textContent = '✏️ Estudar';

  kumonBanner.classList.add('visible');
  kumonBanner.classList.remove('warning');
  kumonBar.classList.add('visible');
  updateKumonBar();
  startTimer();

  conversationHistory = [];
  messagesEl.innerHTML = '';
  addMessage(`📚 Modo Kumon Ativo — Tabuada do ${tab} • Nível ${nivel}/10 🦖`, 'system');

  setInputLocked(true);
  showTyping();
  const trigger = [{ role: 'user', content: 'Vamos começar a aventura!' }];
  try {
    const reply = await fetchClaude(buildKumonPrompt(subjectNome, nivel, tab), trigger);
    hideTyping();
    conversationHistory = [...trigger, { role: 'assistant', content: reply }];
    addMessage(reply, 'bot');
  } catch (err) {
    hideTyping();
    addMessage('❌ Ops! Erro ao começar: ' + err.message, 'system');
    endKumon(); return;
  }
  setInputLocked(false);
}

function updateKumonBar() {
  document.getElementById('kumon-bar-label').textContent = `Desafio ${kumon.count}/${TOTAL_EXERCISES}`;
  document.getElementById('kumon-fill').style.width = `${(kumon.count / TOTAL_EXERCISES) * 100}%`;
  document.getElementById('kumon-score').innerHTML = `✅ ${kumon.acertos} &nbsp;❌ ${kumon.erros}`;
}

function stripMarker(text) {
  return text.replace(/^\s*\[(OK|ERRO)\]\s*$/gim, '').replace(/\n{3,}/g, '\n\n').trim();
}
function parseMarker(text) {
  const m = text.match(/\[(OK|ERRO)\]/i);
  return m ? m[1].toUpperCase() : null;
}

function starsFromScore(acertos, total) {
  if (!total) return 1;
  const p = acertos / total;
  if (p >= 0.95) return 5;
  if (p >= 0.80) return 4;
  if (p >= 0.60) return 3;
  if (p >= 0.40) return 2;
  return 1;
}

function saveProgressKumon(nivel, tabuadaAtual, sessoes90) {
  fetch(`${WORKER_URL}/profile/${PROFILE_USER}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ patches: { progresso_kumon: { nivel, tabuadaAtual, sessoes90, ultimaAtualizacao: new Date().toISOString() } } }),
  }).catch(() => {});
}

function saveTopicStudied(assunto) {
  fetch(`${WORKER_URL}/profile/${PROFILE_USER}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ patches: { topicos_estudados: [{ assunto, data: new Date().toISOString() }] } }),
  }).catch(() => {});
}

function saveSessionHistory(sessionData) {
  fetch(`${WORKER_URL}/history/${PROFILE_USER}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(sessionData),
  }).catch(() => {});
}

function showSummary() {
  if (kumon?.timerInterval) { clearInterval(kumon.timerInterval); kumon.timerInterval = null; }
  kumonBanner.classList.remove('warning');
  const { acertos, erros, subjectNome, nivel, subjectId, tabuadaAtual, startTime } = kumon;
  const total = acertos + erros;
  const pct   = total ? Math.round((acertos / total) * 100) : 0;
  const duracao = startTime ? Math.round((Date.now() - startTime) / 1000) : 0;
  saveSessionHistory({ date: new Date().toISOString(), materia: subjectId, nivel, tabuadaAtual, pct, acertos, total, duracao });
  const stars  = starsFromScore(acertos, total);
  const starStr = '⭐'.repeat(stars) + '✩'.repeat(5 - stars);
  const { novoNivel, avancou, sessoes90, tabuadaAtual: novaTabuada } = registrarSessao(subjectId, nivel, pct >= 90);
  saveProgressKumon(novoNivel, novaTabuada, sessoes90);

  let levelMsg = '';
  if (avancou === 'tabuada')                    levelMsg = `🎉 INCRÍVEL! Você dominou a tabuada do ${tabuadaAtual}! Agora: tabuada do ${novaTabuada}! 🦖🔥`;
  else if (avancou === 'nivel')                 levelMsg = `🎉 UAU! Você passou pro Nível ${novoNivel}! Incrível! 🦖`;
  else if (nivel >= 10 && tabuadaAtual >= 10 && pct >= 90) levelMsg = '🏆 Você dominou TODAS as tabuadas! Campeão absoluto! 🦖👑';
  else if (pct >= 90)                           levelMsg = `🌟 Ótimo! ${sessoes90}/${SESSIONS_TO_ADV} aventuras 90%+ para avançar!`;
  else                                          levelMsg = `Continue explorando! ${sessoes90}/${SESSIONS_TO_ADV} aventuras 90%+ acumuladas 💪`;

  const msgs = [
    'Cada tentativa é uma vitória! Continue explorando! 🦖',
    'Bom esforço, aventureiro! Você vai arrasar! 🌟',
    'Muito bem! Você está ficando mais forte! 💪',
    'Quase perfeito! Você é incrível! 🚀',
    'PERFEITO! Você é um dinossauro genial! 🦖⭐',
  ];
  document.getElementById('sum-title').textContent = `Tabuada do ${tabuadaAtual} concluída! 🎉`;
  document.getElementById('sum-stars').textContent = starStr;
  document.getElementById('sum-score').textContent = `${acertos} de ${total} certas (${pct}%)`;
  document.getElementById('sum-msg').textContent   = msgs[stars - 1];
  document.getElementById('sum-level').textContent = levelMsg;
  document.getElementById('summary-overlay').classList.add('visible');
}
function closeSummary() {
  document.getElementById('summary-overlay').classList.remove('visible');
  endKumon();
}
function endKumon() {
  if (kumon?.timerInterval) clearInterval(kumon.timerInterval);
  kumon = null;
  headerEl.classList.remove('kumon-mode');
  studyBtn.classList.remove('active');
  studyBtn.textContent = '📚 Kumon';
  kumonBanner.classList.remove('visible');
  kumonBanner.classList.remove('warning');
  kumonBar.classList.remove('visible');
  conversationHistory = [];
  messagesEl.innerHTML = '';
  addMessage('🎈 De volta ao chat! Oi! O que vamos fazer agora? 🦖', 'system');
}

studyBtn.addEventListener('click', () => {
  if (kumon) { if (confirm('Quer encerrar a aventura de estudos agora?')) showSummary(); }
  else openSubjectOverlay();
});

// ── Core ──────────────────────────────────────────────────────
function setInputLocked(locked) {
  input.disabled = sendBtn.disabled = locked;
  if (!locked) input.focus();
}
function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}
function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing'; div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function fetchClaude(systemPrompt, messages) {
  const response = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 1024, system: systemPrompt, messages }),
  });
  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || response.statusText);
  }
  return (await response.json()).content?.[0]?.text || '...';
}

async function sendMessage(text) {
  addMessage(text, 'user');
  input.value = '';
  setInputLocked(true);
  showTyping();

  // Detecta e salva interesses de forma assíncrona
  const patches = detectInterests(text);
  if (Object.keys(patches).length) saveInterests(patches);

  if (kumon) {
    kumon.count++;
    updateKumonBar();
    conversationHistory.push({ role: 'user', content: text });
    try {
      const reply = await fetchClaude(buildKumonPrompt(kumon.subjectNome, kumon.nivel, kumon.tabuadaAtual), conversationHistory);
      hideTyping();
      const marker = parseMarker(reply);
      if (marker === 'OK')   kumon.acertos++;
      if (marker === 'ERRO') kumon.erros++;
      updateKumonBar();
      addMessage(stripMarker(reply), 'bot');
      conversationHistory.push({ role: 'assistant', content: reply });
      if (kumon.count >= TOTAL_EXERCISES) setTimeout(() => showSummary(), 2000);
    } catch (err) {
      hideTyping(); kumon.count--; updateKumonBar();
      addMessage('❌ Ops! Erro: ' + err.message, 'system');
    }
  } else {
    conversationHistory.push({ role: 'user', content: text });
    try {
      const reply = await fetchClaude(chatSystemPrompt(), conversationHistory);
      hideTyping();
      addMessage(reply, 'bot');
      conversationHistory.push({ role: 'assistant', content: reply });
      const topic = detectTopic(text);
      if (topic) saveTopicStudied(topic);
    } catch (err) {
      hideTyping();
      addMessage('❌ Não consegui me conectar: ' + err.message, 'system');
    }
  }
  setInputLocked(false);
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text || input.disabled) return;
  sendMessage(text);
});

// Carrega perfil ao iniciar
loadProfile();
</script>
