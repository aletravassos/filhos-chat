<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat do Theo 🎉</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #3B82F6;
    --amarelo: #FBBF24;
    --verde: #34D399;
    --vermelho: #F87171;
    --laranja: #FB923C;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Nunito', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #3B82F6 0%, #34D399 50%, #FBBF24 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .app {
    width: 100%;
    max-width: 480px;
    height: 92vh;
    background: #FFFBEB;
    border-radius: 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 6px #FFF;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 6px solid #FBBF24;
    position: relative;
  }
  header {
    background: linear-gradient(120deg, var(--azul), var(--verde));
    padding: 13px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 6px solid var(--amarelo);
    flex-shrink: 0;
    transition: background 0.4s ease;
  }
  header.kumon-mode {
    background: linear-gradient(120deg, #14532d, #166534);
  }
  .avatar {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: #FFF;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 0 4px var(--amarelo), 0 4px 8px rgba(0,0,0,0.25);
    flex-shrink: 0;
    animation: wiggle 2.5s ease-in-out infinite;
  }
  @keyframes wiggle { 0%, 100% { transform: rotate(-4deg); } 50% { transform: rotate(4deg); } }
  .header-info { color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.25); flex: 1; min-width: 0; }
  .header-info h1 { margin: 0; font-size: 24px; font-weight: 900; }
  .header-info p { margin: 1px 0 0; font-size: 14px; font-weight: 700; }
  #study-btn {
    background: rgba(255,255,255,0.25);
    border: 2.5px solid rgba(255,255,255,0.6);
    color: #fff;
    border-radius: 22px;
    padding: 8px 13px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    transition: background 0.2s, transform 0.1s;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    flex-shrink: 0;
  }
  #study-btn:hover { background: rgba(255,255,255,0.42); }
  #study-btn.active { background: rgba(255,255,255,0.92); color: #14532d; text-shadow: none; }

  /* Kumon mode banner */
  #kumon-banner {
    display: none;
    padding: 8px 14px;
    background: #14532d;
    color: #bbf7d0;
    font-size: 13px;
    font-weight: 800;
    text-align: center;
    border-bottom: 3px dashed #4ade80;
    flex-shrink: 0;
  }
  #kumon-banner.visible { display: block; }

  /* Kumon progress bar */
  #kumon-bar {
    display: none;
    padding: 8px 14px 6px;
    background: #FEF3C7;
    border-bottom: 3px dashed var(--amarelo);
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #kumon-bar.visible { display: flex; }
  #kumon-bar-label { font-size: 13px; color: #92400e; white-space: nowrap; font-weight: 800; }
  #kumon-track { flex: 1; height: 10px; background: rgba(251,191,36,0.3); border-radius: 8px; overflow: hidden; }
  #kumon-fill { height: 100%; background: linear-gradient(90deg, var(--azul), var(--verde)); border-radius: 8px; transition: width 0.45s ease; width: 0%; }
  #kumon-score { font-size: 13px; color: #92400e; white-space: nowrap; font-weight: 800; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background:
      radial-gradient(circle at 10% 20%, rgba(251,191,36,0.15) 0, transparent 25%),
      radial-gradient(circle at 90% 60%, rgba(52,211,153,0.15) 0, transparent 25%),
      #FFFBEB;
  }
  .msg { max-width: 80%; padding: 13px 17px; border-radius: 22px; font-size: 18px; line-height: 1.65; word-wrap: break-word; animation: pop 0.3s ease; font-weight: 700; }
  @keyframes pop { from { opacity: 0; transform: translateY(10px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .msg.user {
    align-self: flex-end;
    background: var(--azul);
    color: #fff;
    border-bottom-right-radius: 6px;
    box-shadow: 0 3px 0 #1d4ed8;
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--verde);
    color: #064e3b;
    border-bottom-left-radius: 6px;
    box-shadow: 0 3px 0 #059669;
  }
  .msg.system {
    align-self: center;
    background: var(--amarelo);
    color: #78350f;
    font-size: 15px;
    text-align: center;
    border-radius: 14px;
    padding: 10px 16px;
    box-shadow: 0 3px 0 #d97706;
  }
  .typing { align-self: flex-start; display: flex; gap: 5px; padding: 14px 18px; background: var(--verde); border-radius: 22px; box-shadow: 0 3px 0 #059669; }
  .typing span { width: 9px; height: 9px; border-radius: 50%; background: #064e3b; animation: bounce 1.1s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-7px); } }
  form {
    display: flex;
    gap: 10px;
    padding: 14px 16px;
    background: #FFFBEB;
    border-top: 4px dashed var(--amarelo);
    flex-shrink: 0;
  }
  #input {
    flex: 1;
    border: 3px solid var(--azul);
    border-radius: 24px;
    padding: 14px 18px;
    background: #fff;
    color: #1f2937;
    font-size: 18px;
    outline: none;
    font-weight: 700;
    font-family: inherit;
  }
  #input:focus { border-color: var(--verde); }
  #input:disabled { opacity: 0.5; }
  #send {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: none;
    background: var(--laranja);
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: 0 4px 0 #c2410c;
    transition: transform 0.1s;
  }
  #send:active { transform: translateY(3px); box-shadow: 0 1px 0 #c2410c; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }

  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-thumb { background: var(--amarelo); border-radius: 4px; }

  /* Overlays */
  #subject-overlay, #summary-overlay {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 30;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    text-align: center;
  }
  #subject-overlay.visible, #summary-overlay.visible { display: flex; }

  #subject-overlay {
    background: linear-gradient(160deg, #EFF6FF 0%, #ECFDF5 100%);
  }
  #subject-overlay h2 { color: #1d4ed8; margin: 0 0 4px; font-size: 24px; font-weight: 900; }
  .sub-desc { color: #065f46; font-size: 15px; margin: 0 0 18px; font-weight: 700; }
  .subject-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 290px; }
  .subject-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border-radius: 20px;
    border: 3px solid #FBBF24;
    background: #FFFBEB;
    color: #1f2937;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    box-shadow: 0 4px 0 #d97706;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .subject-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #d97706; background: #FEF3C7; }
  .subject-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #d97706; }
  .s-icon { font-size: 26px; }
  .s-info { flex: 1; }
  .s-name { display: block; }
  .s-nivel { display: block; font-size: 12px; color: #6b7280; margin-top: 2px; font-weight: 700; }
  .s-sessoes { display: block; font-size: 11px; color: #9ca3af; margin-top: 1px; font-weight: 700; }
  .overlay-cancel {
    margin-top: 16px;
    background: none;
    border: none;
    color: #9ca3af;
    cursor: pointer;
    font-size: 15px;
    font-family: inherit;
    font-weight: 700;
    transition: color 0.15s;
  }
  .overlay-cancel:hover { color: #374151; }

  /* Summary overlay */
  #summary-overlay {
    background: linear-gradient(160deg, #FFFBEB 0%, #ECFDF5 100%);
    gap: 4px;
  }
  #summary-overlay h2 { color: #1d4ed8; margin: 0 0 2px; font-size: 26px; font-weight: 900; }
  .summary-stars { font-size: 44px; letter-spacing: 4px; margin: 6px 0; }
  .summary-score { color: #065f46; font-size: 19px; font-weight: 800; margin: 2px 0; }
  .summary-msg { color: #374151; font-size: 15px; font-weight: 700; margin: 4px 0 6px; }
  .summary-level-msg { color: #d97706; font-size: 15px; font-weight: 900; margin-bottom: 14px; }
  .summary-btn {
    padding: 15px 36px;
    border-radius: 28px;
    border: none;
    background: var(--laranja);
    color: #fff;
    font-size: 18px;
    font-weight: 900;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 0 #c2410c;
    transition: transform 0.1s;
  }
  .summary-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #c2410c; }
</style>
</head>
<body>

<div class="app">
  <header id="header">
    <div class="avatar">🦖</div>
    <div class="header-info">
      <h1>Theo Rex</h1>
      <p>🟢 pronto pra brincar!</p>
    </div>
    <button id="study-btn">📚 Kumon</button>
  </header>

  <div id="kumon-banner">📚 Modo Kumon Ativo — <span id="banner-text"></span></div>

  <div id="kumon-bar">
    <span id="kumon-bar-label">Desafio 0/5</span>
    <div id="kumon-track"><div id="kumon-fill"></div></div>
    <span id="kumon-score">✅ 0 &nbsp;❌ 0</span>
  </div>

  <div id="messages">
    <div class="msg system">🎈 Oi! Eu sou o Theo Rex! Escreve algo pra brincarmos! 🦖</div>
  </div>

  <div id="subject-overlay">
    <h2>📚 Estudar hoje!</h2>
    <p class="sub-desc">Qual aventura do saber vamos escolher? 🦖</p>
    <div class="subject-btns" id="subject-btns"></div>
    <button class="overlay-cancel" onclick="closeSubjectOverlay()">cancelar</button>
  </div>

  <div id="summary-overlay">
    <h2 id="sum-title">Aventura concluída!</h2>
    <div class="summary-stars" id="sum-stars"></div>
    <div class="summary-score" id="sum-score"></div>
    <div class="summary-msg" id="sum-msg"></div>
    <div class="summary-level-msg" id="sum-level"></div>
    <button class="summary-btn" onclick="closeSummary()">Continuar! 🚀</button>
  </div>

  <form id="form">
    <input type="text" id="input" placeholder="Escreve aqui pro Theo... 🦖" autocomplete="off">
    <button type="submit" id="send">🚀</button>
  </form>
</div>

<script>
const CHAT_SYSTEM_PROMPT = `Você é o Theo Rex, um dinossaurinho amigo virtual super divertido e animado, que conversa com uma criança de 9 anos.
Seu jeito de falar:
- Seja muito alegre, curioso e brincalhão, como um melhor amigo de aventuras.
- Use frases curtas, simples e fáceis de entender para uma criança de 9 anos.
- Use bastante emojis para deixar tudo mais divertido (mas sem exagerar a ponto de poluir a mensagem).
- Adore falar sobre dinossauros, animais, espaço, desenhos, brincadeiras, escola e curiosidades legais.
- Seja sempre gentil, encorajador e elogie esforços da criança (ex: tarefas de escola, desenhos, ideias).
- Nunca trate de temas assustadores, violentos, sexuais ou inadequados para a idade. Se a criança perguntar algo assim, desconverse com gentileza e sugira conversar com um adulto de confiança.
- Se a criança parecer triste, com medo ou contar algo preocupante, seja acolhedor e sugira com carinho que conte para um adulto de confiança (pai, mãe ou professor).
- Responda sempre em português brasileiro, em mensagens curtas, divertidas e fáceis de ler.`;

const KUMON_SUBJECTS = [
  { id: 'contas',    nome: 'Contas',    icon: '🔢' },
  { id: 'palavras',  nome: 'Palavras',  icon: '✏️' },
  { id: 'leitura',   nome: 'Leitura',   icon: '📖' },
];

const TOTAL_EXERCISES = 5;
const SESSIONS_TO_ADVANCE = 3;
const WORKER_URL = 'https://claude-proxy-worker.aletravassos.workers.dev';

function buildKumonPrompt(subjectNome, nivel) {
  return `Você é o Theo Rex, um dinossaurinho aventureiro! Agora estamos na AVENTURA DO SABER! 🦖

MATÉRIA: ${subjectNome}
NÍVEL ATUAL: ${nivel}/10 (1 = super fácil, 10 = desafiador)

REGRAS DA AVENTURA:
1. Comece imediatamente com o Desafio 1/${TOTAL_EXERCISES}. Escreva "🦖 Desafio [N]/${TOTAL_EXERCISES}:" antes de cada questão.
2. Use a pedagogia Waldorf: envolva cada exercício em uma mini-história ou aventura imaginativa divertida. A questão deve emergir naturalmente da história. Faça a criança SENTIR a situação, não apenas resolver. Valorize o esforço e o processo, nunca a competição. Use os jogos favoritos como ponte pedagógica: Minecraft para matemática e geometria (construir blocos, medir áreas, calcular recursos), Mario para contagem e velocidade (quantas moedas, quanto falta para a próxima fase), Pokémon para categorização e português (tipos de Pokémon, nomes, leitura de descrições).
3. Use linguagem muito simples, colorida e cheia de emojis, adequado para 9 anos.
4. Quando a criança responder, avalie com muito entusiasmo! Se errou, explique de forma gentil com uma metáfora ou continuação da história. Celebre o esforço mesmo quando erra.
5. Ao final da sua avaliação, em linha separada, escreva exatamente: [OK] (se correto) ou [ERRO] (se incorreto). Depois, se ainda houver desafios, apresente o próximo imediatamente.
6. No desafio ${TOTAL_EXERCISES}/${TOTAL_EXERCISES}, após o token [OK] ou [ERRO], comemore muito a aventura toda! Não apresente novo desafio.
7. Se a criança fizer uma pergunta fora da matéria ou quiser falar de outro assunto: responda brevemente (1-2 frases) com muito entusiasmo, depois redirecione conectando o interesse ao conteúdo usando os jogos como ponte. Exemplo: se ele perguntar sobre Minecraft enquanto estuda Contas, diga "UAU! Minecraft é demais! 🎮 No Minecraft você precisa de exatamente esse tipo de conta pra construir! Vamos ver..." e volte ao desafio.
8. Responda sempre em português brasileiro.`;
}

const messagesEl = document.getElementById('messages');
const form       = document.getElementById('form');
const input      = document.getElementById('input');
const sendBtn    = document.getElementById('send');
const studyBtn   = document.getElementById('study-btn');
const headerEl   = document.getElementById('header');
const kumonBar   = document.getElementById('kumon-bar');
const kumonBanner = document.getElementById('kumon-banner');

let conversationHistory = [];
let kumon = null;

// ── localStorage ──────────────────────────────────────────────
function loadProgress() {
  try { return JSON.parse(localStorage.getItem('kumon_theo') || '{}'); }
  catch { return {}; }
}
function saveProgress(p) { localStorage.setItem('kumon_theo', JSON.stringify(p)); }
function getNivel(id) { return loadProgress()[id]?.nivel || 1; }
function getSessoes90(id) { return loadProgress()[id]?.sessoes90 || 0; }

// Registra sessão; avança nível após SESSIONS_TO_ADVANCE sessões com 90%+
// Retorna { novoNivel, avancou, sessoes90 }
function registrarSessao(id, nivel, acertou90) {
  const p = loadProgress();
  if (!p[id]) p[id] = { nivel: 1, sessoes90: 0 };
  if (acertou90) {
    p[id].sessoes90 = (p[id].sessoes90 || 0) + 1;
    if (p[id].sessoes90 >= SESSIONS_TO_ADVANCE && p[id].nivel < 10) {
      p[id].nivel++;
      p[id].sessoes90 = 0;
      saveProgress(p);
      return { novoNivel: p[id].nivel, avancou: true, sessoes90: 0 };
    }
  }
  saveProgress(p);
  return { novoNivel: p[id].nivel, avancou: false, sessoes90: p[id].sessoes90 };
}

// ── Kumon UI ──────────────────────────────────────────────────
function openSubjectOverlay() {
  const container = document.getElementById('subject-btns');
  container.innerHTML = '';
  KUMON_SUBJECTS.forEach(s => {
    const nivel = getNivel(s.id);
    const sessoes = getSessoes90(s.id);
    const btn = document.createElement('button');
    btn.className = 'subject-btn';
    btn.innerHTML = `
      <span class="s-icon">${s.icon}</span>
      <span class="s-info">
        <span class="s-name">${s.nome}</span>
        <span class="s-nivel">Nível ${nivel}/10</span>
        <span class="s-sessoes">${sessoes}/${SESSIONS_TO_ADVANCE} aventuras 90%+ para avançar</span>
      </span>`;
    btn.onclick = () => startKumon(s.id, s.nome, s.icon, nivel);
    container.appendChild(btn);
  });
  document.getElementById('subject-overlay').classList.add('visible');
}

function closeSubjectOverlay() {
  document.getElementById('subject-overlay').classList.remove('visible');
}

async function startKumon(subjectId, subjectNome, subjectIcon, nivel) {
  closeSubjectOverlay();
  kumon = { subjectId, subjectNome, subjectIcon, nivel, count: 0, acertos: 0, erros: 0 };

  // Header visual
  headerEl.classList.add('kumon-mode');
  studyBtn.classList.add('active');
  studyBtn.textContent = '✏️ Estudar';

  // Banner
  document.getElementById('banner-text').textContent = `${subjectNome} • Nível ${nivel}`;
  kumonBanner.classList.add('visible');

  // Barra de progresso
  kumonBar.classList.add('visible');
  updateKumonBar();

  conversationHistory = [];
  messagesEl.innerHTML = '';
  addMessage(`📚 Modo Kumon Ativo — ${subjectNome} • Nível ${nivel}/10 🦖`, 'system');

  setInputLocked(true);
  showTyping();

  const trigger = [{ role: 'user', content: 'Vamos começar a aventura!' }];
  try {
    const reply = await fetchClaude(buildKumonPrompt(subjectNome, nivel), trigger);
    hideTyping();
    conversationHistory = trigger;
    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage(reply, 'bot');
  } catch (err) {
    hideTyping();
    addMessage('❌ Ops! Erro ao começar: ' + err.message, 'system');
    endKumon();
    return;
  }
  setInputLocked(false);
}

function updateKumonBar() {
  document.getElementById('kumon-bar-label').textContent = `Desafio ${kumon.count}/${TOTAL_EXERCISES}`;
  document.getElementById('kumon-fill').style.width = `${(kumon.count / TOTAL_EXERCISES) * 100}%`;
  document.getElementById('kumon-score').innerHTML = `✅ ${kumon.acertos} &nbsp;❌ ${kumon.erros}`;
}

function stripMarker(text) {
  return text.replace(/^\s*\[(OK|ERRO)\]\s*$/gim, '').replace(/\n{3,}/g, '\n\n').trim();
}

function parseMarker(text) {
  const m = text.match(/\[(OK|ERRO)\]/i);
  return m ? m[1].toUpperCase() : null;
}

function starsFromScore(acertos, total) {
  if (total === 0) return 1;
  const pct = acertos / total;
  if (pct >= 0.95) return 5;
  if (pct >= 0.80) return 4;
  if (pct >= 0.60) return 3;
  if (pct >= 0.40) return 2;
  return 1;
}

function showSummary() {
  const { acertos, erros, subjectNome, nivel, subjectId } = kumon;
  const total = acertos + erros;
  const pct   = total > 0 ? Math.round((acertos / total) * 100) : 0;
  const stars = starsFromScore(acertos, total);
  const starStr = '⭐'.repeat(stars) + '✩'.repeat(5 - stars);

  const { novoNivel, avancou, sessoes90 } = registrarSessao(subjectId, nivel, pct >= 90);

  let levelMsg = '';
  if (avancou) {
    levelMsg = `🎉 UAU! Você passou pro Nível ${novoNivel}! Incrível! 🦖`;
  } else if (nivel >= 10 && pct >= 90) {
    levelMsg = '🏆 Nível máximo desbloqueado! Você é um gênio! 🦖';
  } else if (pct >= 90) {
    levelMsg = `🌟 Ótimo! ${sessoes90}/${SESSIONS_TO_ADVANCE} aventuras 90%+ para avançar de nível!`;
  } else {
    levelMsg = `Continue explorando! ${sessoes90}/${SESSIONS_TO_ADVANCE} aventuras 90%+ acumuladas 💪`;
  }

  const msgs = [
    'Cada tentativa é uma vitória! Continue explorando! 🦖',
    'Bom esforço, aventureiro! Você vai arrasar! 🌟',
    'Muito bem! Você está ficando mais forte! 💪',
    'Quase perfeito! Você é incrível! 🚀',
    'PERFEITO! Você é um dinossauro genial! 🦖⭐',
  ];

  document.getElementById('sum-title').textContent = `${subjectNome} concluída! 🎉`;
  document.getElementById('sum-stars').textContent = starStr;
  document.getElementById('sum-score').textContent = `${acertos} de ${total} certas (${pct}%)`;
  document.getElementById('sum-msg').textContent = msgs[stars - 1];
  document.getElementById('sum-level').textContent = levelMsg;
  document.getElementById('summary-overlay').classList.add('visible');
}

function closeSummary() {
  document.getElementById('summary-overlay').classList.remove('visible');
  endKumon();
}

function endKumon() {
  kumon = null;
  headerEl.classList.remove('kumon-mode');
  studyBtn.classList.remove('active');
  studyBtn.textContent = '📚 Kumon';
  kumonBanner.classList.remove('visible');
  kumonBar.classList.remove('visible');
  conversationHistory = [];
  messagesEl.innerHTML = '';
  addMessage('🎈 De volta ao chat! Oi! O que vamos fazer agora? 🦖', 'system');
}

studyBtn.addEventListener('click', () => {
  if (kumon) {
    if (confirm('Quer encerrar a aventura de estudos agora?')) showSummary();
  } else {
    openSubjectOverlay();
  }
});

// ── Core ──────────────────────────────────────────────────────
function setInputLocked(locked) {
  input.disabled = locked;
  sendBtn.disabled = locked;
  if (!locked) input.focus();
}

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function fetchClaude(systemPrompt, messages) {
  const response = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1024,
      system: systemPrompt,
      messages
    })
  });
  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || response.statusText);
  }
  const data = await response.json();
  return data.content?.[0]?.text || '...';
}

async function sendMessage(text) {
  addMessage(text, 'user');
  input.value = '';
  setInputLocked(true);
  showTyping();

  if (kumon) {
    kumon.count++;
    updateKumonBar();
    conversationHistory.push({ role: 'user', content: text });
    try {
      const reply = await fetchClaude(buildKumonPrompt(kumon.subjectNome, kumon.nivel), conversationHistory);
      hideTyping();
      const marker = parseMarker(reply);
      if (marker === 'OK')   kumon.acertos++;
      if (marker === 'ERRO') kumon.erros++;
      updateKumonBar();
      addMessage(stripMarker(reply), 'bot');
      conversationHistory.push({ role: 'assistant', content: reply });
      if (kumon.count >= TOTAL_EXERCISES) setTimeout(() => showSummary(), 2000);
    } catch (err) {
      hideTyping();
      kumon.count--;
      updateKumonBar();
      addMessage('❌ Ops! Erro: ' + err.message, 'system');
    }
  } else {
    conversationHistory.push({ role: 'user', content: text });
    try {
      const reply = await fetchClaude(CHAT_SYSTEM_PROMPT, conversationHistory);
      hideTyping();
      addMessage(reply, 'bot');
      conversationHistory.push({ role: 'assistant', content: reply });
    } catch (err) {
      hideTyping();
      addMessage('❌ Não consegui me conectar: ' + err.message, 'system');
    }
  }
  setInputLocked(false);
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text || input.disabled) return;
  sendMessage(text);
});
</script>
